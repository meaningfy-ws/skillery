[pytest]
# No-src layout: make the top-level package importable from the repo root.
pythonpath = .
testpaths = tests
python_files = test_*.py
python_functions = test_*

# No --cov here (decision D5): coverage flags live only in the Makefile's
# `test` and `coverage-report` targets, so plain `pytest` stays fast.
addopts =
    -v
    --strict-markers
    --tb=short

asyncio_mode = auto

log_format = %(asctime)s %(levelname)-8s %(name)s %(message)s
log_date_format = %Y-%m-%dT%H:%M:%S

# Markers are applied automatically by tests/conftest.py via
# pytest_collection_modifyitems (by path) — do NOT add per-file pytestmark.
markers =
    unit: fast, no I/O — domain/service/adapter layer tests
    feature: BDD feature tests (pytest-bdd step definitions)
    e2e: end-to-end tests against a near-real stack
    integration: requires a running datastore/service
