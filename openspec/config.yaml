schema: meaningfy

# Project context — injected into every artifact's instructions (wrapped in <context>).
# This is OpenSpec's native project-context sink (Q2.4). The durable truth is
# openspec/specs/; this string is the orientation index. If a generated index is
# ever wanted, regenerate it deterministically into this field (see
# spine/epic-change-memory-mapping.md) — do not hand-curate a parallel MEMORY.md.
context: |
  Repo: skillery — Meaningfy's company-wide Claude Code skills/agents/docs catalogue.
  This openspec/ instance dogfoods the Meaningfy spine on skillery itself.
  Architecture: cosmic-python layering (models, adapters, services, entrypoints).
  Commits: Conventional Commits (imperative, no trailing punctuation).
  Artifact vocabulary: EPIC ≡ proposal.md (Shape-Up work shape);
  PLAN ≡ design.md + tasks.md (clarity gate scores the pair ≥9/10);
  normative requirements ≡ specs/ deltas (RFC-2119 SHALL + Given/When/Then, no EARS).

# Per-artifact rules — THIN by design (Q2.1=A). Only the 3 hard rules; rich
# per-artifact rules are deferred until the dogfood gate. Additive to the
# schema's built-in instructions.
rules:
  proposal:
    - The EPIC MUST state an Appetite and a No-gos section (an EPIC without no-gos is unshaped).
  specs:
    - Use RFC-2119 SHALL/MUST; every requirement MUST have at least one #### Scenario (WHEN/THEN). No EARS.
  tasks:
    - The PLAN MUST cite its parent EPIC id on the first line (golden thread — cite your parent).
